<!doctype html>
<html lang="{{ site.Language.LanguageCode | default "zh-cn" }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1d1f21">
  <meta name="description" content="{{ .Description | default site.Params.description }}">
  <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} · {{ site.Title }}{{ end }}</title>
  <script>document.documentElement.dataset.theme=localStorage.getItem('theme')||(matchMedia('(prefers-color-scheme:light)').matches?'light':'dark')</script>
  <link rel="icon" href="{{ "images/mark.svg" | relURL }}" type="image/svg+xml">
  <link rel="stylesheet" href="{{ "css/main.css" | relURL }}">
  <script defer src="{{ "js/main.js" | relURL }}"></script>
</head>
<body id="top" class="{{ if .IsPage }}is-page{{ end }}">
  <header class="site-header">
    <a class="brand" href="{{ site.Home.RelPermalink }}" aria-label="Thnuller 首页"><img src="{{ "images/brand.png" | relURL }}" alt="Thnuller"></a>
    <div class="header-actions">
      <nav class="main-nav" aria-label="主导航">
        {{ $current := . }}
        {{ range site.Menus.main }}
          <a href="{{ .URL }}" class="{{ if $current.IsMenuCurrent "main" . }}active{{ else if $current.HasMenuCurrent "main" . }}active{{ end }}">{{ .Name }}</a>
        {{ end }}
      </nav>
      <div class="VPNavBarAppearance appearance">
        <button class="vt-switch vt-switch-appearance" type="button" role="switch" aria-label="切换深色模式" aria-checked="false">
          <span class="vt-switch-check"><span class="vt-switch-icon">
            <svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" viewBox="0 0 24 24" class="vt-switch-appearance-sun"><path d="M12 18a6 6 0 1 1 0-12 6 6 0 0 1 0 12Zm0-10a4 4 0 1 0 0 8 4 4 0 0 0 0-8Z"/><path d="M12 4a1 1 0 0 1-1-1V1a1 1 0 1 1 2 0v2a1 1 0 0 1-1 1Zm0 20a1 1 0 0 1-1-1v-2a1 1 0 1 1 2 0v2a1 1 0 0 1-1 1ZM5.6 6.6a1 1 0 0 1-.7-.3L3.5 4.9a1 1 0 0 1 1.4-1.4l1.4 1.4a1 1 0 0 1-.7 1.7Zm14.2 14.2a1 1 0 0 1-.7-.3l-1.4-1.4a1 1 0 0 1 1.4-1.4l1.4 1.4a1 1 0 0 1-.7 1.7ZM4 12a1 1 0 0 1-1 1H1a1 1 0 1 1 0-2h2a1 1 0 0 1 1 1Zm20 0a1 1 0 0 1-1 1h-2a1 1 0 1 1 0-2h2a1 1 0 0 1 1 1ZM4.2 20.8a1 1 0 0 1-.7-1.7l1.4-1.4a1 1 0 0 1 1.4 1.4l-1.4 1.4a1 1 0 0 1-.7.3ZM18.4 6.6a1 1 0 0 1-.7-1.7l1.4-1.4a1 1 0 0 1 1.4 1.4l-1.4 1.4a1 1 0 0 1-.7.3Z"/></svg>
            <svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" viewBox="0 0 24 24" class="vt-switch-appearance-moon"><path d="M12.1 22h-.9a10 10 0 0 1 0-19.9 1 1 0 0 1 .9 1.6 6 6 0 0 0 8.4 8.4 1 1 0 0 1 1.6.9 10 10 0 0 1-10 9Zm-2.8-17.6A8 8 0 1 0 19.5 14.7 8 8 0 0 1 9.3 4.4Z"/></svg>
          </span></span>
        </button>
      </div>
      <button class="nav-toggle" type="button" aria-label="打开菜单" aria-expanded="false"><span></span><span></span></button>
    </div>
  </header>
  <main>{{ block "main" . }}{{ end }}</main>
  <footer class="site-footer"><span>© {{ now.Year }} Thnuller</span><span>STAY CURIOUS / STAY ALERT</span></footer>
</body>
</html>
